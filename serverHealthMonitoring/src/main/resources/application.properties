spring.application.name=serverHealthMonitoring

server.port=8081

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/health_monitor_db
spring.datasource.username=postgres
spring.datasource.password=admin

# Hibernate Settings
# 'update' automatically creates/updates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Set retention policy (default to 7 days)
metrics.retention.days=7

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-digit-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Set everything to WARN (hides info logs from Spring/Hibernate)
logging.level.root=WARN

# Set your package to INFO (shows your custom logs)
# Replace 'com.example.monitor' with your actual package name
logging.level.com.project.serverHealthMonitoring=INFO

# Optional: Set the logging format to be cleaner
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %msg%n